name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Release check
        run: npm run release:check

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          PACKAGE_VERSION=$(node -e "const fs = require('node:fs'); console.log(JSON.parse(fs.readFileSync('package.json', 'utf8')).version)")
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            RELEASE_TAG="${GITHUB_REF_NAME}"
          else
            RELEASE_TAG="v${PACKAGE_VERSION}"
          fi
          echo "package_version=${PACKAGE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Validate tag version
        if: github.ref_type == 'tag'
        shell: bash
        run: |
          if [[ "${{ steps.meta.outputs.release_tag }}" != "v${{ steps.meta.outputs.package_version }}" ]]; then
            echo "Tag version does not match package.json version."
            exit 1
          fi

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --provenance

      - name: Create or update GitHub release
        uses: actions/github-script@v7
        env:
          RELEASE_TAG: ${{ steps.meta.outputs.release_tag }}
        with:
          script: |
            const tag = process.env.RELEASE_TAG
            try {
              await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag
              })
              core.info(`Release ${tag} already exists, skip creation.`)
            } catch (error) {
              if (error.status !== 404) {
                throw error
              }
              await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: tag,
                name: tag,
                target_commitish: context.sha,
                generate_release_notes: true
              })
            }
