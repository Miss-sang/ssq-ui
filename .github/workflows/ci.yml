name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test with coverage
        run: npm run test:coverage -- --run

      - name: Enforce coverage thresholds
        run: npm run coverage:check

      - name: Build library
        run: npm run build

      - name: Build docs
        run: DOCS_BASE=/ssq-ui/ npm run docs:build

      - name: Perf smoke
        run: npm run perf:smoke

      - name: Performance report
        run: npm run perf:report > perf-report.txt

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage

      - name: Upload performance report
        uses: actions/upload-artifact@v4
        with:
          name: perf-report
          path: perf-report.txt

      - name: Checkout base branch for coverage diff
        if: github.event_name == 'pull_request'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: baseline

      - name: Install baseline dependencies
        if: github.event_name == 'pull_request'
        working-directory: baseline
        run: npm ci
        continue-on-error: true

      - name: Generate baseline coverage
        if: github.event_name == 'pull_request'
        working-directory: baseline
        run: npm run test:coverage -- --run
        continue-on-error: true

      - name: Format coverage comment
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          if [[ -f baseline/coverage/coverage-summary.json ]]; then
            node scripts/format-coverage-comment.mjs coverage/coverage-summary.json baseline/coverage/coverage-summary.json > coverage-comment.md
          else
            node scripts/format-coverage-comment.mjs coverage/coverage-summary.json > coverage-comment.md
          fi

      - name: Comment coverage summary on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('node:fs')
            const body = fs.readFileSync('coverage-comment.md', 'utf8')
            const marker = '<!-- ssq-ui-coverage-comment -->'
            const commentBody = `${marker}\n${body}`
            const { owner, repo } = context.repo
            const issue_number = context.issue.number
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number
            })
            const existing = comments.find(comment => comment.body?.includes(marker))

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body: commentBody
              })
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body: commentBody
              })
            }
