name: Deploy Docs

on:
  push:
    branches: [main, master]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  deploy:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve docs target
        id: target
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "base=/ssq-ui/pr-preview/pr-${{ github.event.pull_request.number }}/" >> "$GITHUB_OUTPUT"
            echo "dest=pr-preview/pr-${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
            echo "url=https://miss-sang.github.io/ssq-ui/pr-preview/pr-${{ github.event.pull_request.number }}/" >> "$GITHUB_OUTPUT"
          else
            echo "base=/ssq-ui/" >> "$GITHUB_OUTPUT"
            echo "dest=" >> "$GITHUB_OUTPUT"
            echo "url=https://miss-sang.github.io/ssq-ui/" >> "$GITHUB_OUTPUT"
          fi

      - name: Build docs
        run: DOCS_BASE=${{ steps.target.outputs.base }} npm run docs:build

      - name: Add .nojekyll
        run: touch docs/.vitepress/dist/.nojekyll

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/.vitepress/dist
          publish_branch: gh-pages
          destination_dir: ${{ steps.target.outputs.dest }}
          keep_files: true

      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          PREVIEW_URL: ${{ steps.target.outputs.url }}
        with:
          script: |
            const marker = '<!-- ssq-ui-doc-preview -->'
            const body = `${marker}\nPreview docs: ${process.env.PREVIEW_URL}`
            const { owner, repo } = context.repo
            const issue_number = context.issue.number
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number
            })
            const existing = comments.find(comment => comment.body?.includes(marker))

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body
              })
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body
              })
            }
